name: 'licitaciones_analytics'
version: '1.0.0'
config-version: 2

profile: 'licitaciones_analytics'

model-paths: ["models"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  licitaciones_analytics:
    staging:
      +materialized: view
    marts:
      +materialized: table

# Carpeta donde viven los CSV de origen (ChileCompra / Mercado Público).
# El repo incluye un snapshot en data/ para que sea reproducible al clonar.
# Para usar otra ubicación (p.ej. la salida en vivo del pipeline de Python):
#   dbt build --vars '{data_dir: ../}'
vars:
  data_dir: "data"
